<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTM Charaktereditor - Revised Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&display=swap');
        
        body { 
            font-family: 'Crimson Pro', serif; 
            background: radial-gradient(circle at center, #0a2f1f 0%, #051a11 50%, #020806 100%);
            background-attachment: fixed;
        }

        .revised-card {
            background-color: rgba(5, 20, 15, 0.95);
            border: 2px solid #1a4d36;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 50px rgba(0, 50, 30, 0.2);
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .header-font {
            font-family: 'UnifrakturMaguntia', serif;
        }

        .dot-filled {
            background: radial-gradient(circle at 30% 30%, #34d399, #065f46);
            box-shadow: 0 0 5px rgba(52, 211, 153, 0.4);
        }

        .dot-disabled {
            background: #1a2e25;
            border-color: #0d1a14;
            cursor: not-allowed !important;
        }

        .health-box, .text-box {
            border: 1px solid #1a4d36;
            background: rgba(0,0,0,0.3);
        }

        textarea {
            resize: none;
            scrollbar-width: thin;
            scrollbar-color: #1a4d36 transparent;
        }

        /* --- CLAN AUSWAHL STYLING --- */
        select {
            background-color: #051a11;
            color: #d1d5db;
            border-bottom: 1px solid rgba(6, 95, 70, 0.3);
            cursor: pointer;
            appearance: none;
            outline: none;
        }
        
        select option {
            background-color: #051a11;
            color: #d1d5db;
            font-style: normal;
            font-weight: normal;
        }

        /* Hier werden die Überschriften (optgroup) gesteuert */
        optgroup {
            font-style: italic !important;
            font-weight: bold !important;
            color: #10b981 !important; /* Emerald-500 */
            background-color: #051a11 !important; /* Erzwinge dunklen Hintergrund */
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="text-stone-300 min-h-screen py-8 px-4 relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const DotRating = ({ value, max = 5, onChange, min = 0, disabled = false, alwaysEmpty = false, readOnly = false }) => {
            return (
                <div className={`flex space-x-1.5 items-center ${disabled ? 'opacity-30' : ''}`}>
                    {[...Array(max)].map((_, i) => (
                        <div
                            key={i}
                            onClick={() => {
                                if (disabled || alwaysEmpty || readOnly) return;
                                const newValue = i + 1;
                                onChange(newValue === value ? Math.max(min, value - 1) : newValue);
                            }}
                            className={`w-3.5 h-3.5 rounded-full border border-emerald-900 transition-all duration-300
                                ${disabled || alwaysEmpty || readOnly ? 'dot-disabled' : 'cursor-pointer'}
                                ${(i < value && !disabled && !alwaysEmpty) ? 'dot-filled scale-110' : 'bg-black/40 hover:bg-emerald-900/40'}`}
                        />
                    ))}
                </div>
            );
        };

        const InfoBox = ({ isOpen, text }) => {
            if (!isOpen) return null;
            return (
                <div className="mb-6 p-4 border border-emerald-800 bg-black/60 text-xs text-stone-400 leading-relaxed rounded animate-fadeIn">
                    {text}
                </div>
            );
        };

        const App = () => {
            const [character, setCharacter] = useState({
                info: {
                    Name: "", Spieler: "", Chronik: "",
                    Wesen: "", Verhalten: "", Clan: "",
                    Generation: "", Zuflucht: "", Konzept: ""
                },
                attributes: {
                    körperlich: { Körperkraft: 1, Geschick: 1, Widerstandsfähigkeit: 1 },
                    gesellschaftlich: { Charisma: 1, Manipulation: 1, Erscheinungsbild: 1 },
                    geistig: { Wahrnehmung: 1, Intelligenz: 1, Geistesschärfe: 1 }
                },
                abilities: {
                    talente: {
                        Ausdruck: 0, Aufmerksamkeit: 0, Ausflüchte: 0, Ausweichen: 0,
                        Einschüchtern: 0, Empathie: 0, Führungsqualitäten: 0, Handgemenge: 0,
                        Sportlichkeit: 0, Szenekenntnis: 0
                    },
                    fertigkeiten: {
                        Etikette: 0, Fahren: 0, Handwerk: 0, Heimlichkeit: 0, Nahkampf: 0,
                        Schusswaffen: 0, Sicherheit: 0, Tierkunde: 0, Überleben: 0, Vortrag: 0
                    },
                    kenntnisse: {
                        Akademisches_Wissen: 0, Computer: 0, Finanzen: 0, Gesetzeskenntnis: 0,
                        Linguistik: 0, Medizin: 0, Nachforschungen: 0, Naturwissenschaften: 0,
                        Okkultismus: 0, Politik: 0
                    }
                },
                advantages: {
                    disziplinen: [{ name: "", value: 0 }, { name: "", value: 0 }, { name: "", value: 0 }],
                    hintergründe: [{ name: "", value: 0 }, { name: "", value: 0 }, { name: "", value: 0 }],
                    tugenden: { Gewissen: 1, Selbstbeherrschung: 1, Mut: 1 }
                },
                status: {
                    gesundheit: [
                        { label: "Blaue Flecken", penalty: 0, checked: false },
                        { label: "Verletzt", penalty: -1, checked: false },
                        { label: "Schwer Verletzt", penalty: -1, checked: false },
                        { label: "Verwundet", penalty: -2, checked: false },
                        { label: "Schwer Verwundet", penalty: -2, checked: false },
                        { label: "Verkrüppelt", penalty: -5, checked: false },
                        { label: "Außer Gefecht", penalty: "X", checked: false },
                    ]
                },
                extra: { vorzügeSchwächen: "", erfahrung: "" }
            });

            const [showAttrInfo, setShowAttrInfo] = useState(false);
            const [showAbilInfo, setShowAbilInfo] = useState(false);
            const [showAdvInfo, setShowAdvInfo] = useState(false);
            const [notification, setNotification] = useState({ text: "", show: false });
            const timeoutRef = useRef(null);

            const isNosferatu = character.info.Clan === "Nosferatu";
            const currentWillpower = character.advantages.tugenden.Mut;

            const showToast = (msg) => {
                setNotification({ text: msg, show: true });
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                timeoutRef.current = setTimeout(() => setNotification({ text: "", show: false }), 4000);
            };

            const updateInfo = (f, v) => setCharacter(p => ({ ...p, info: { ...p.info, [f]: v } }));
            const updateStat = (cat, sub, f, v) => setCharacter(p => ({
                ...p, [cat]: { ...p[cat], [sub]: { ...p[cat][sub], [f]: v } }
            }));

            const calcAttrSpent = (catData) => {
                let spent = 0;
                for (const [attr, val] of Object.entries(catData)) {
                    if (isNosferatu && attr === "Erscheinungsbild") continue;
                    spent += Math.max(0, val - 1);
                }
                return spent;
            };

            const calcAbilSpent = (catData) => Object.values(catData).reduce((sum, val) => sum + val, 0);
            const calcDisziplinenSpent = () => character.advantages.disziplinen.reduce((sum, d) => sum + d.value, 0);
            const calcHintergruendeSpent = () => character.advantages.hintergründe.reduce((sum, h) => sum + h.value, 0);
            const calcTugendenSpent = () => Object.values(character.advantages.tugenden).reduce((sum, val) => sum + Math.max(0, val - 1), 0);

            const handleAttributeChange = (cat, name, newValue) => {
                const oldValue = character.attributes[cat][name];
                if (newValue <= oldValue) { updateStat('attributes', cat, name, newValue); return; }
                const currentSpent = {
                    körperlich: calcAttrSpent(character.attributes.körperlich),
                    gesellschaftlich: calcAttrSpent(character.attributes.gesellschaftlich),
                    geistig: calcAttrSpent(character.attributes.geistig)
                };
                const newSpent = currentSpent[cat] + (newValue - oldValue);
                const spentArray = [
                    cat === 'körperlich' ? newSpent : currentSpent.körperlich,
                    cat === 'gesellschaftlich' ? newSpent : currentSpent.gesellschaftlich,
                    cat === 'geistig' ? newSpent : currentSpent.geistig
                ].sort((a, b) => b - a);
                if (spentArray[0] > 7 || spentArray[1] > 5 || spentArray[2] > 3) {
                    showToast("Regelverstoß: Beachte die Verteilung 7/5/3!"); return;
                }
                updateStat('attributes', cat, name, newValue);
            };

            const handleAbilityChange = (cat, name, newValue) => {
                const oldValue = character.abilities[cat][name];
                if (newValue <= oldValue) { updateStat('abilities', cat, name, newValue); return; }
                const currentSpent = {
                    talente: calcAbilSpent(character.abilities.talente),
                    fertigkeiten: calcAbilSpent(character.abilities.fertigkeiten),
                    kenntnisse: calcAbilSpent(character.abilities.kenntnisse)
                };
                const newSpent = currentSpent[cat] + (newValue - oldValue);
                const spentArray = [
                    cat === 'talente' ? newSpent : currentSpent.talente,
                    cat === 'fertigkeiten' ? newSpent : currentSpent.fertigkeiten,
                    cat === 'kenntnisse' ? newSpent : currentSpent.kenntnisse
                ].sort((a, b) => b - a);
                if (spentArray[0] > 13 || spentArray[1] > 9 || spentArray[2] > 5) {
                    showToast("Regelverstoß: Beachte die Verteilung 13/9/5!"); return;
                }
                updateStat('abilities', cat, name, newValue);
            };

            const updateHealth = (i) => {
                const nh = [...character.status.gesundheit];
                nh[i].checked = !nh[i].checked;
                setCharacter(p => ({ ...p, status: { ...p.status, gesundheit: nh } }));
            };

            const clans = {
                "Camarilla": ["Brujah", "Gangrel", "Malkavian", "Nosferatu", "Toreador", "Tremere", "Ventrue"],
                "Sabbat": ["Lasombra", "Tzimisce"],
                "Unabhängige": ["Assamite", "Followers of Set", "Giovanni", "Ravnos"]
            };

            return (
                <div className="max-w-5xl mx-auto revised-card p-8 md:p-12 mb-12 relative overflow-hidden">
                    <header className="text-center mb-12 border-b border-emerald-900/50 pb-6">
                        <h1 className="text-6xl font-bold tracking-[0.2em] text-emerald-500 uppercase mb-2 drop-shadow-lg header-font">Vampire</h1>
                        <p className="text-sm tracking-[0.5em] text-emerald-700 font-bold uppercase">Die Maskerade</p>
                    </header>

                    {/* --- HIER WIRD DIE CLAN-AUSWAHL GERENDERT --- */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-x-8 gap-y-4 mb-12">
                        {Object.entries(character.info).map(([key, val]) => (
                            <div key={key} className="flex flex-col border-b border-emerald-900/30">
                                <label className="text-[10px] uppercase text-emerald-600 font-bold tracking-widest">{key}</label>
                                {key === "Clan" ? (
                                    <select 
                                        value={val} 
                                        onChange={(e) => updateInfo(key, e.target.value)} 
                                        className="bg-transparent outline-none py-1 text-stone-100"
                                    >
                                        <option value="" disabled>Wähle...</option>
                                        {/* Gruppierung der Clans */}
                                        {Object.entries(clans).map(([group, list]) => (
                                            <optgroup key={group} label={group}>
                                                {list.map(c => <option key={c} value={c}>{c}</option>)}
                                            </optgroup>
                                        ))}
                                    </select>
                                ) : (
                                    <input type="text" value={val} onChange={(e) => updateInfo(key, e.target.value)} className="bg-transparent outline-none py-1 text-stone-100" placeholder="____________________" />
                                )}
                            </div>
                        ))}
                    </div>

                    {/* Rest des Charakterbogens (gekürzt für Übersichtlichkeit im Code-Block) */}
                    <div className="space-y-16">
                        {/* Attribute Section */}
                        <section>
                            <div className="relative flex justify-center items-center border-y border-emerald-900/50 py-1 mb-6">
                                <h2 className="text-xl font-bold uppercase tracking-[0.3em] text-emerald-500">Attribute</h2>
                                <button onClick={() => setShowAttrInfo(!showAttrInfo)} className="absolute right-0 w-6 h-6 rounded-full border border-emerald-700 text-emerald-600 flex items-center justify-center text-xs font-bold">i</button>
                            </div>
                            <InfoBox isOpen={showAttrInfo} text="Attribute werden nach dem Schema 7 / 5 / 3 verteilt (zusätzlich zum jeweils freien ersten Punkt)." />
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                                {Object.entries(character.attributes).map(([cat, fields]) => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[11px] font-bold text-emerald-800 uppercase italic border-b border-emerald-900/20 pb-1 mb-3">{cat} ({calcAttrSpent(fields)})</h3>
                                        {Object.entries(fields).map(([name, val]) => (
                                            <div key={name} className="flex justify-between items-center group">
                                                <span className="text-sm group-hover:text-emerald-400 transition-colors">{name}</span>
                                                <DotRating value={val} min={name === "Erscheinungsbild" && isNosferatu ? 0 : 1} disabled={name === "Erscheinungsbild" && isNosferatu} onChange={(v) => handleAttributeChange(cat, name, v)} />
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Fähigkeiten Section */}
                        <section>
                            <div className="relative flex justify-center items-center border-y border-emerald-900/50 py-1 mb-6">
                                <h2 className="text-xl font-bold uppercase tracking-[0.3em] text-emerald-500">Fähigkeiten</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                                {Object.entries(character.abilities).map(([cat, fields]) => (
                                    <div key={cat} className="space-y-1">
                                        <h3 className="text-[11px] font-bold text-emerald-800 uppercase italic border-b border-emerald-900/20 text-center pb-1 mb-3">{cat} ({calcAbilSpent(fields)})</h3>
                                        {Object.entries(fields).map(([name, val]) => (
                                            <div key={name} className="flex justify-between items-center">
                                                <span className="text-xs">{name.replace(/_/g, ' ')}</span>
                                                <DotRating value={val} onChange={(v) => handleAbilityChange(cat, name, v)} />
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Vorteile & Status Section */}
                        <section>
                            <div className="relative flex justify-center items-center border-y border-emerald-900/50 py-1 mb-6">
                                <h2 className="text-xl font-bold uppercase tracking-[0.3em] text-emerald-500">Vorteile</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                                {/* Disziplinen, Hintergründe, Tugenden */}
                                <div>
                                    <h3 className="text-[11px] font-bold text-emerald-800 uppercase italic text-center border-b border-emerald-900/20 pb-1 mb-4">Disziplinen</h3>
                                    {character.advantages.disziplinen.map((d, i) => (
                                        <div key={i} className="flex justify-between items-center mb-3">
                                            <input value={d.name} onChange={(e) => {const nl = [...character.advantages.disziplinen]; nl[i].name = e.target.value; setCharacter(p => ({...p, advantages: {...p.advantages, disziplinen: nl}}))}} className="bg-transparent border-b border-emerald-900/30 text-sm outline-none w-2/3" />
                                            <DotRating value={d.value} onChange={(v) => {const nl = [...character.advantages.disziplinen]; nl[i].value = v; setCharacter(p => ({...p, advantages: {...p.advantages, disziplinen: nl}}));}} />
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h3 className="text-[11px] font-bold text-emerald-800 uppercase italic text-center border-b border-emerald-900/20 pb-1 mb-4">Hintergründe</h3>
                                    {character.advantages.hintergründe.map((h, i) => (
                                        <div key={i} className="flex justify-between items-center mb-3">
                                            <input value={h.name} onChange={(e) => {const nl = [...character.advantages.hintergründe]; nl[i].name = e.target.value; setCharacter(p => ({...p, advantages: {...p.advantages, hintergründe: nl}}))}} className="bg-transparent border-b border-emerald-900/30 text-sm outline-none w-2/3" />
                                            <DotRating value={h.value} onChange={(v) => {const nl = [...character.advantages.hintergründe]; nl[i].value = v; setCharacter(p => ({...p, advantages: {...p.advantages, hintergründe: nl}}));}} />
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h3 className="text-[11px] font-bold text-emerald-800 uppercase italic text-center border-b border-emerald-900/20 pb-1 mb-4">Tugenden</h3>
                                    {Object.entries(character.advantages.tugenden).map(([name, val]) => (
                                        <div key={name} className="flex justify-between items-center mb-4">
                                            <span className="text-sm font-bold text-stone-400">{name}</span>
                                            <DotRating value={val} min={1} onChange={(v) => updateStat('advantages', 'tugenden', name, v)} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>
                        
                         {/* Status */}
                        <section>
                            <div className="relative flex justify-center items-center border-y border-emerald-900/50 py-1 mb-6 mt-12">
                                <h2 className="text-xl font-bold uppercase tracking-[0.3em] text-emerald-500">Status</h2>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                                <div className="space-y-12">
                                    <div className="text-center">
                                        <h3 className="text-[10px] font-bold text-emerald-700 uppercase tracking-widest border-b border-emerald-900/20 mb-4">Menschlichkeit / Pfad</h3>
                                        <div className="flex justify-center">
                                            <DotRating value={0} max={10} alwaysEmpty={true} />
                                        </div>
                                    </div>
                                    <div className="text-center">
                                        <h3 className="text-[10px] font-bold text-emerald-700 uppercase tracking-widest border-b border-emerald-900/20 mb-4 flex justify-between items-center">
                                            <span>Willenskraft</span>
                                            <span className="text-emerald-500 text-[9px] lowercase opacity-50">Basis = Mut ({currentWillpower})</span>
                                        </h3>
                                        <div className="flex justify-center mb-4">
                                            <DotRating value={currentWillpower} max={10} readOnly={true} />
                                        </div>
                                        <div className="flex justify-center space-x-1.5">
                                            {[...Array(10)].map((_, i) => <div key={i} className="w-6 h-6 border-2 border-emerald-900 bg-black/40" />)}
                                        </div>
                                    </div>
                                    <div>
                                        <h3 className="text-[10px] font-bold text-emerald-700 uppercase tracking-widest border-b border-emerald-900/20 mb-4">Blutvorrat</h3>
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-10 gap-1.5">{[...Array(10)].map((_, i) => <div key={i} className="h-5 border border-emerald-500 bg-emerald-900/40 rounded-sm" />)}</div>
                                            <div className="grid grid-cols-10 gap-1.5">{[...Array(10)].map((_, i) => <div key={i} className="h-5 border border-emerald-900 bg-black/40 rounded-sm" />)}</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-8">
                                    <div className="p-6 health-box rounded-lg shadow-inner">
                                        <h3 className="text-[11px] font-bold text-emerald-500 uppercase mb-6 tracking-widest border-b border-emerald-900/50 pb-2 italic text-center">Gesundheit</h3>
                                        <div className="space-y-2.5">
                                            {character.status.gesundheit.map((h, i) => (
                                                <div key={i} className="flex justify-between items-center text-xs cursor-pointer" onClick={() => updateHealth(i)}>
                                                    <span className="font-semibold uppercase tracking-tighter">{h.label}</span>
                                                    <div className="flex items-center space-x-4">
                                                        <span className="text-emerald-600 font-bold w-4">{h.penalty !== 0 ? h.penalty : ""}</span>
                                                        <div className={`w-5 h-5 border-2 border-emerald-900 flex items-center justify-center ${h.checked ? 'bg-emerald-700' : 'bg-black/40'}`}>
                                                            {h.checked && "/"}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <h3 className="text-[10px] font-bold text-emerald-700 uppercase tracking-widest text-center">Vorzüge / Schwächen</h3>
                                        <textarea className="w-full h-40 p-3 text-sm text-box rounded outline-none text-stone-200" value={character.extra.vorzügeSchwächen} onChange={(e) => setCharacter(p => ({...p, extra: {...p.extra, vorzügeSchwächen: e.target.value}}))} />
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>

                    {notification.show && (
                        <div className="fixed bottom-6 right-6 z-50 toast-enter">
                            <div className="bg-red-950/90 border-l-4 border-red-600 text-red-200 px-6 py-4 shadow-lg rounded-r flex items-center space-x-3">
                                <span className="font-bold text-sm">{notification.text}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
